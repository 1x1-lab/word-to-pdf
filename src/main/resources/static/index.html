<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <title>Word 转 PDF POC</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0;
            background: #f5f6f8;
            color: #1f2937;
        }
        .container {
            max-width: 820px;
            margin: 40px auto;
            padding: 0 24px;
        }
        h1 { font-size: 22px; margin: 0 0 4px; }
        .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        label { display: block; font-size: 13px; color: #374151; margin-bottom: 6px; font-weight: 600; }
        .hint { font-size: 12px; color: #9ca3af; margin-top: 4px; }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px dashed #d1d5db;
            border-radius: 8px;
            background: #fafafa;
            font-size: 13px;
        }
        textarea {
            width: 100%;
            min-height: 160px;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: "JetBrains Mono", Menlo, monospace;
            font-size: 12px;
            resize: vertical;
        }
        .row { display: flex; gap: 12px; align-items: center; }
        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: 0;
            background: #2563eb;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .btn.secondary {
            background: #e5e7eb;
            color: #1f2937;
        }
        .status {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
        }
        .status.error { background: #fee2e2; color: #991b1b; }
        .status.info { background: #dbeafe; color: #1e40af; }
        .status.success { background: #dcfce7; color: #166534; }
        code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
        .preview-wrap {
            margin-top: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            background: #fafafa;
        }
        .preview-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
            font-size: 12px;
            color: #6b7280;
        }
        .preview-head a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
        .preview-frame {
            width: 100%;
            height: 70vh;
            border: 0;
            display: block;
            background: #525659;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Word 转 PDF POC</h1>
        <div class="subtitle">上传 <code>.docx</code> 模板，填充 <code>${变量}</code>，导出 PDF（顶部自动插入 Logo）。</div>

        <form id="form" class="card">
            <label for="template">1. 选择 Word 模板（.docx）</label>
            <input type="file" id="template" name="template" accept=".docx" required/>
            <div class="hint">模板里用 <code>${title}</code>、<code>${user.name}</code> 等占位符。</div>

            <div style="margin-top: 16px;">
                <label for="variables">2. 变量 JSON</label>
                <textarea id="variables" name="variables" placeholder='{"title":"示例标题","name":"张三","date":"2026-06-18"}'>{
  "title": "示例标题",
  "name": "张三",
  "date": "2026-06-18",
  "company": "POC 演示公司"
}</textarea>
                <div class="hint">键名与 <code>${...}</code> 内的文本一致。值可以是字符串、数字、布尔值。</div>
            </div>

            <div class="row" style="margin-top: 20px;">
                <button type="submit" class="btn" id="submitBtn">转换为 PDF</button>
                <button type="button" class="btn secondary" id="clearBtn">清空变量</button>
                <a href="/api/sample-template" class="btn secondary" style="text-decoration:none;">下载示例模板</a>
            </div>

            <div id="status" class="status" style="display:none;"></div>

            <div id="preview-section" style="display:none; margin-top: 20px;">
                <div class="preview-wrap">
                    <div class="preview-head">
                        <span>PDF 预览</span>
                        <a id="preview-download" href="#" download="converted.pdf">下载 PDF</a>
                    </div>
                    <iframe id="preview-frame" class="preview-frame" title="PDF Preview"></iframe>
                </div>
            </div>
        </form>

        <div class="card">
            <div style="font-size: 13px; color: #6b7280;">
                <strong>开源依赖</strong><br/>
                Spring Boot (Apache-2.0) · docx4j (Apache-2.0) · Apache FOP (Apache-2.0)
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('form');
        const submitBtn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        const variablesEl = document.getElementById('variables');

        function showStatus(type, msg) {
            status.style.display = 'block';
            status.className = 'status ' + type;
            status.textContent = msg;
        }

        const previewSection = document.getElementById('preview-section');
        const previewFrame = document.getElementById('preview-frame');
        const previewDownload = document.getElementById('preview-download');
        let currentBlobUrl = null;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('template');
            if (!fileInput.files || !fileInput.files[0]) {
                showStatus('error', '请先选择 .docx 文件。');
                return;
            }

            // Validate variables JSON before submitting.
            let variablesValue = variablesEl.value.trim();
            if (variablesValue) {
                try {
                    JSON.parse(variablesValue);
                } catch (err) {
                    showStatus('error', '变量 JSON 解析失败：' + err.message);
                    return;
                }
            }

            const fd = new FormData();
            fd.append('template', fileInput.files[0]);
            if (variablesValue) {
                fd.append('variables', variablesValue);
            }

            submitBtn.disabled = true;
            showStatus('info', '转换中…请稍候。');
            // Clear previous preview.
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
            }
            previewFrame.src = 'about:blank';
            previewSection.style.display = 'none';

            try {
                const resp = await fetch('/api/convert', { method: 'POST', body: fd });
                if (!resp.ok) {
                    let detail = resp.statusText;
                    try {
                        detail = (await resp.text()) || detail;
                    } catch (_) { /* ignore */ }
                    throw new Error('HTTP ' + resp.status + (detail ? ' - ' + detail : ''));
                }
                const blob = await resp.blob();
                currentBlobUrl = URL.createObjectURL(blob);

                // Inline preview via iframe.
                previewFrame.src = currentBlobUrl;
                previewDownload.href = currentBlobUrl;
                previewSection.style.display = 'block';

                showStatus('success',
                    '转换完成。大小：' + (blob.size / 1024).toFixed(1) + ' KB。' +
                    '点击右上方"下载 PDF"保存。');
            } catch (err) {
                showStatus('error', '转换失败：' + err.message);
            } finally {
                submitBtn.disabled = false;
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            variablesEl.value = '';
        });
    </script>
</body>
</html>
